<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Compliance Training Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        , ::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: 07101e;
            --surface: 0d1a2e;
            --surface2: 132035;
            --border: 1c2e47;
            --gold: c9a84c;
            --gold2: e8c97a;
            --text: dce8f5;
            --muted: 4e6a88;
            --danger: f87171;
            --radius: 14px;
        }

        html, body {
            height: 100%;
            background-color: 07101e;
            color: dce8f5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .login-page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            max-width: 420px;
            margin: 0 auto;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-badge {
            display: inline-block;
            border: 1px solid rgba(201,168,76,0.4);
            color: c9a84c;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            padding: 5px 14px;
            border-radius: 4px;
            margin-bottom: 24px;
            background: rgba(201,168,76,0.05);
        }

        .login-brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: dce8f5;
            line-height: 1.15;
            margin-bottom: 12px;
        }

        .login-brand h1 span {
            font-style: italic;
            color: c9a84c;
        }

        .login-brand p {
            font-size: 13px;
            color: 4e6a88;
            line-height: 1.7;
        }

        .login-box {
            width: 100%;
            background-color: 0d1a2e;
            border: 1px solid 1c2e47;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .login-box-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: c9a84c;
            margin-bottom: 16px;
        }

        .login-field {
            margin-bottom: 16px;
        }

        .login-field label {
            display: block;
            font-size: 12px;
            color: 4e6a88;
            margin-bottom: 6px;
        }

        .login-field input {
            display: block;
            width: 100%;
            background-color: 07101e;
            border: 1px solid 1c2e47;
            border-radius: 8px;
            color: dce8f5;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 12px 14px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s;
        }

        .login-field input:focus {
            border-color: c9a84c;
        }

        .login-field input::placeholder {
            color: 4e6a88;
        }

        .login-error {
            background-color: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: f87171;
            margin-bottom: 12px;
            display: none;
            line-height: 1.5;
        }

        .login-lockout {
            background-color: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.25);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 12px;
            color: f87171;
            text-align: center;
            margin-bottom: 12px;
            display: none;
            line-height: 1.5;
        }

        .login-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: c9a84c;
            color: 07101e;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: opacity 0.2s;
            margin-top: 4px;
        }

        .login-submit:hover {
            opacity: 0.9;
        }

        .login-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .login-attempts {
            font-size: 11px;
            color: 4e6a88;
            text-align: center;
            margin-top: 12px;
        }

        .login-footer {
            font-size: 11px;
            color: 4e6a88;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="login-page">

        <div class="login-brand">
            <div class="login-badge">COMPLIANCE TRAINING PLATFORM</div>
            <h1>Secure <span>Login</span></h1>
            <p>Enter your access password to continue to the training platform.</p>
        </div>

        <div class="login-box">
            <div class="login-box-title">Authentication</div>

            <div class="login-lockout" id="lockoutMsg">
                Too many failed attempts. Please wait <strong id="lockoutTimer">15:00</strong> before trying again.
            </div>

            <form id="loginForm" action="javascript:void(0);" method="post">
                <div class="login-field">
                    <label for="passwordInput">Access Password</label>
                    <input type="password" id="passwordInput" name="password" placeholder="Enter password..." autocomplete="current-password" required>
                </div>

                <div class="login-error" id="errorMsg">Invalid password.</div>

                <button type="submit" class="login-submit" id="loginBtn">Login</button>
            </form>

            <div class="login-attempts" id="attemptsInfo"></div>
        </div>

        <div class="login-footer">Compliance Training Platform</div>

    </div>

    <script type="text/javascript">
        (function() {

            var MAX_ATTEMPTS = 10;
            var LOCKOUT_MS = 15  60  1000;
            var timerRef = null;

            function readLockout() {
                try {
                    var s = localStorage.getItem('ct_lockout');
                    if (!s) return { attempts: 0, lockedUntil: 0 };
                    var d = JSON.parse(s);
                    return { attempts: d.attempts || 0, lockedUntil: d.lockedUntil || 0 };
                } catch(e) {
                    return { attempts: 0, lockedUntil: 0 };
                }
            }

            function writeLockout(att, until) {
                localStorage.setItem('ct_lockout', JSON.stringify({ attempts: att, lockedUntil: until }));
            }

            function locked() {
                var d = readLockout();
                if (d.lockedUntil > Date.now()) return true;
                if (d.lockedUntil > 0 && d.lockedUntil <= Date.now()) {
                    writeLockout(0, 0);
                }
                return false;
            }

            function refreshUI() {
                var d = readLockout();
                var lockDiv = document.getElementById('lockoutMsg');
                var btn = document.getElementById('loginBtn');
                var pw = document.getElementById('passwordInput');
                var info = document.getElementById('attemptsInfo');

                if (d.lockedUntil > Date.now()) {
                    lockDiv.style.display = 'block';
                    btn.disabled = true;
                    pw.disabled = true;

                    if (timerRef) clearInterval(timerRef);

                    var tick = function() {
                        var left = d.lockedUntil - Date.now();
                        if (left <= 0) {
                            clearInterval(timerRef);
                            timerRef = null;
                            writeLockout(0, 0);
                            lockDiv.style.display = 'none';
                            btn.disabled = false;
                            pw.disabled = false;
                            info.textContent = '';
                            return;
                        }
                        var m = Math.floor(left / 60000);
                        var s = Math.floor((left % 60000) / 1000);
                        var ss = s < 10 ? '0' + s : '' + s;
                        document.getElementById('lockoutTimer').textContent = m + ':' + ss;
                    };

                    tick();
                    timerRef = setInterval(tick, 1000);

                } else {
                    lockDiv.style.display = 'none';
                    btn.disabled = false;
                    pw.disabled = false;

                    if (d.attempts > 0 && d.attempts < MAX_ATTEMPTS) {
                        var r = MAX_ATTEMPTS - d.attempts;
                        info.textContent = r + ' attempt' + (r === 1 ? '' : 's') + ' remaining before lockout.';
                    } else {
                        info.textContent = '';
                    }
                }
            }

            function doLogin(evt) {
                evt.preventDefault();

                if (locked()) {
                    refreshUI();
                    return;
                }

                var pw = document.getElementById('passwordInput');
                var errDiv = document.getElementById('errorMsg');
                var btn = document.getElementById('loginBtn');
                var pass = pw.value;

                if (!pass) return;

                btn.disabled = true;
                btn.textContent = 'Verifying...';
                errDiv.style.display = 'none';

                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/auth', true);
                xhr.setRequestHeader('Content-Type', 'application/json');

                xhr.onload = function() {
                    var result;
                    try {
                        result = JSON.parse(xhr.responseText);
                    } catch(e) {
                        result = { success: false, message: 'Server error.' };
                    }

                    if (result.success === true) {
                        writeLockout(0, 0);
                        sessionStorage.setItem('ct_token', result.token);
                        window.location.href = '/index.html';
                        return;
                    }

                    var ld = readLockout();
                    var newAtt = ld.attempts + 1;

                    if (newAtt >= MAX_ATTEMPTS) {
                        writeLockout(newAtt, Date.now() + LOCKOUT_MS);
                    } else {
                        writeLockout(newAtt, 0);
                    }

                    errDiv.textContent = result.message || 'Invalid password.';
                    errDiv.style.display = 'block';

                    btn.disabled = false;
                    btn.textContent = 'Login';

                    refreshUI();
                };

                xhr.onerror = function() {
                    errDiv.textContent = 'Connection error. Please try again.';
                    errDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Login';
                };

                xhr.send(JSON.stringify({ password: pass }));
            }

            function init() {
                var existingToken = sessionStorage.getItem('ct_token');
                if (existingToken) {
                    var checkXhr = new XMLHttpRequest();
                    checkXhr.open('GET', '/api/auth', true);
                    checkXhr.setRequestHeader('Authorization', 'Bearer ' + existingToken);
                    checkXhr.onload = function() {
                        if (checkXhr.status === 200) {
                            window.location.href = '/index.html';
                        } else {
                            sessionStorage.removeItem('ct_token');
                            refreshUI();
                        }
                    };
                    checkXhr.onerror = function() {
                        window.location.href = '/index.html';
                    };
                    checkXhr.send();
                    return;
                }

                refreshUI();

                var form = document.getElementById('loginForm');
                form.addEventListener('submit', doLogin);

                var pwField = document.getElementById('passwordInput');
                if (pwField && !pwField.disabled) {
                    pwField.focus();
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
